<!-- ==========================================
     CASH COUNT & CASH DRAWER
========================================== -->

<div class="card shadow-sm mb-4">

    <div class="card-header bg-warning">

        <h5 class="mb-0">

            <i class="fa-solid fa-cash-register"></i>

            Cash Count & Cash Drawer

        </h5>

    </div>

    <div class="card-body">

        <div class="row g-3">

            <!-- Opening Cash -->

            <div class="col-lg-2">

                <label class="form-label">

                    Opening Cash

                </label>

                <input
                    type="number"
                    class="form-control"
                    id="openingCashAmount"
                    value="0.00"
                    readonly>

            </div>

            <!-- Cash Sales -->

            <div class="col-lg-2">

                <label class="form-label">

                    Cash Sales

                </label>

                <input
                    type="number"
                    class="form-control"
                    id="cashSalesAmount"
                    value="0.00"
                    readonly>

            </div>

            <!-- Cash In -->

            <div class="col-lg-2">

                <label class="form-label">

                    Cash In

                </label>

                <input
                    type="number"
                    class="form-control"
                    id="cashInAmount"
                    value="0.00">

            </div>

            <!-- Cash Out -->

            <div class="col-lg-2">

                <label class="form-label">

                    Cash Out

                </label>

                <input
                    type="number"
                    class="form-control"
                    id="cashOutAmount"
                    value="0.00">

            </div>

            <!-- Expected Cash -->

            <div class="col-lg-2">

                <label class="form-label fw-bold">

                    Expected Cash

                </label>

                <input
                    type="number"
                    class="form-control fw-bold"
                    id="expectedCash"
                    value="0.00"
                    readonly>

            </div>

            <!-- Actual Cash -->

            <div class="col-lg-2">

                <label class="form-label fw-bold">

                    Actual Cash

                </label>

                <input
                    type="number"
                    class="form-control fw-bold"
                    id="actualCash"
                    value="0.00">

            </div>

        </div>

        <div class="row mt-4">

            <div class="col-lg-3">

                <label class="form-label text-danger fw-bold">

                    Over / Short

                </label>

                <input
                    type="text"
                    class="form-control fw-bold"
                    id="overShort"
                    value="₱0.00"
                    readonly>

            </div>

        </div>

    </div>

</div>
