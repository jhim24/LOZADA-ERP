<!-- ==========================================
     CASH DENOMINATION
========================================== -->

<div class="card shadow-sm mb-4">

    <div class="card-header bg-secondary text-white">

        <h5 class="mb-0">

            <i class="fa-solid fa-money-bill-wave"></i>

            Cash Denomination

        </h5>

    </div>

    <div class="card-body">

        <div class="row g-3">

            <!-- PAPER BILLS -->

            <div class="col-lg-2">

                <label class="form-label">₱1000</label>

                <input type="number"
                       class="form-control denomination"
                       data-value="1000"
                       id="bill1000"
                       value="0">

            </div>

            <div class="col-lg-2">

                <label class="form-label">₱500</label>

                <input type="number"
                       class="form-control denomination"
                       data-value="500"
                       id="bill500"
                       value="0">

            </div>

            <div class="col-lg-2">

                <label class="form-label">₱200</label>

                <input type="number"
                       class="form-control denomination"
                       data-value="200"
                       id="bill200"
                       value="0">

            </div>

            <div class="col-lg-2">

                <label class="form-label">₱100</label>

                <input type="number"
                       class="form-control denomination"
                       data-value="100"
                       id="bill100"
                       value="0">

            </div>

            <div class="col-lg-2">

                <label class="form-label">₱50</label>

                <input type="number"
                       class="form-control denomination"
                       data-value="50"
                       id="bill50"
                       value="0">

            </div>

            <div class="col-lg-2">

                <label class="form-label">₱20</label>

                <input type="number"
                       class="form-control denomination"
                       data-value="20"
                       id="bill20"
                       value="0">

            </div>

        </div>

        <hr>

        <div class="row g-3">

            <!-- COINS -->

            <div class="col-lg-2">

                <label class="form-label">₱10</label>

                <input type="number"
                       class="form-control denomination"
                       data-value="10"
                       id="coin10"
                       value="0">

            </div>

            <div class="col-lg-2">

                <label class="form-label">₱5</label>

                <input type="number"
                       class="form-control denomination"
                       data-value="5"
                       id="coin5"
                       value="0">

            </div>

            <div class="col-lg-2">

                <label class="form-label">₱1</label>

                <input type="number"
                       class="form-control denomination"
                       data-value="1"
                       id="coin1"
                       value="0">

            </div>

            <div class="col-lg-2">

                <label class="form-label">₱0.25</label>

                <input type="number"
                       class="form-control denomination"
                       data-value="0.25"
                       id="coin025"
                       value="0">

            </div>

            <div class="col-lg-4">

                <label class="form-label fw-bold">

                    Total Cash Count

                </label>

                <input type="text"
                       class="form-control fw-bold"
                       id="cashDenominationTotal"
                       value="₱0.00"
                       readonly>

            </div>

        </div>

    </div>

</div>
