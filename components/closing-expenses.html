<!-- ==========================================
     EXPENSES & CASH OUT
========================================== -->

<div class="card shadow-sm mb-4">

    <div class="card-header bg-danger text-white">

        <h5 class="mb-0">

            <i class="fa-solid fa-wallet"></i>

            Expenses & Cash Out

        </h5>

    </div>

    <div class="card-body">

        <div class="row g-3">

            <!-- PETTY CASH -->

            <div class="col-lg-3">

                <label class="form-label">

                    Petty Cash

                </label>

                <input
                    type="number"
                    class="form-control"
                    id="pettyCash"
                    value="0.00">

            </div>

            <!-- SUPPLIES -->

            <div class="col-lg-3">

                <label class="form-label">

                    Supplies

                </label>

                <input
                    type="number"
                    class="form-control"
                    id="suppliesExpense"
                    value="0.00">

            </div>

            <!-- TRANSPORTATION -->

            <div class="col-lg-3">

                <label class="form-label">

                    Transportation

                </label>

                <input
                    type="number"
                    class="form-control"
                    id="transportationExpense"
                    value="0.00">

            </div>

            <!-- MISC -->

            <div class="col-lg-3">

                <label class="form-label">

                    Miscellaneous

                </label>

                <input
                    type="number"
                    class="form-control"
                    id="miscExpense"
                    value="0.00">

            </div>

        </div>

        <div class="row mt-3">

            <div class="col-lg-12">

                <label class="form-label">

                    Expense Reason / Remarks

                </label>

                <textarea
                    class="form-control"
                    id="expenseRemarks"
                    rows="3"
                    placeholder="Enter complete details of all cash out and expenses..."></textarea>

            </div>

        </div>

        <div class="row mt-3">

            <div class="col-lg-4">

                <label class="form-label fw-bold">

                    Total Expenses

                </label>

                <input
                    type="text"
                    class="form-control fw-bold"
                    id="totalExpenses"
                    value="₱0.00"
                    readonly>

            </div>

        </div>

    </div>

</div>
