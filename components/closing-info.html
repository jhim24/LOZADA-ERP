<!-- ==========================================
     CASHIER INFORMATION
========================================== -->

<div class="card shadow-sm mb-4">

    <div class="card-header bg-primary text-white">

        <h5 class="mb-0">

            <i class="fa-solid fa-user-tie"></i>

            Cashier Information

        </h5>

    </div>

    <div class="card-body">

        <div class="row g-3">

            <div class="col-lg-3">

                <label class="form-label">

                    Opening Cash

                </label>

                <input
                    type="number"
                    class="form-control"
                    id="openingCash"
                    placeholder="0.00">

            </div>

            <div class="col-lg-3">

                <label class="form-label">

                    Opening Time

                </label>

                <input
                    type="time"
                    class="form-control"
                    id="openingTime">

            </div>

            <div class="col-lg-3">

                <label class="form-label">

                    POS Terminal

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="terminalNo"
                    placeholder="Terminal 01">

            </div>

            <div class="col-lg-3">

                <label class="form-label">

                    Shift No.

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="shiftNo"
                    placeholder="SHIFT-001">

            </div>

        </div>

    </div>

</div>
