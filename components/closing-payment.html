<!-- ==========================================
     PAYMENT SUMMARY
========================================== -->

<div class="card shadow-sm mb-4">

    <div class="card-header bg-info text-white">

        <h5 class="mb-0">

            <i class="fa-solid fa-credit-card"></i>

            Payment Summary

        </h5>

    </div>

    <div class="card-body">

        <div class="row g-3">

            <div class="col-lg-2">

                <label class="form-label">

                    Cash

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="paymentCash"
                    value="₱0.00"
                    readonly>

            </div>

            <div class="col-lg-2">

                <label class="form-label">

                    GCash

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="paymentGCash"
                    value="₱0.00"
                    readonly>

            </div>

            <div class="col-lg-2">

                <label class="form-label">

                    Maya

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="paymentMaya"
                    value="₱0.00"
                    readonly>

            </div>

            <div class="col-lg-2">

                <label class="form-label">

                    Credit Card

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="paymentCreditCard"
                    value="₱0.00"
                    readonly>

            </div>

            <div class="col-lg-2">

                <label class="form-label">

                    Debit Card

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="paymentDebitCard"
                    value="₱0.00"
                    readonly>

            </div>

            <div class="col-lg-2">

                <label class="form-label">

                    Bank Transfer

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="paymentBankTransfer"
                    value="₱0.00"
                    readonly>

            </div>

        </div>

        <div class="row g-3 mt-2">

            <div class="col-lg-3">

                <label class="form-label">

                    Food Panda

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="paymentFoodPanda"
                    value="₱0.00"
                    readonly>

            </div>

            <div class="col-lg-3">

                <label class="form-label">

                    Grab Food

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="paymentGrabFood"
                    value="₱0.00"
                    readonly>

            </div>

            <div class="col-lg-3">

                <label class="form-label">

                    Other Payment

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="paymentOthers"
                    value="₱0.00"
                    readonly>

            </div>

            <div class="col-lg-3">

                <label class="form-label fw-bold">

                    Total Payment

                </label>

                <input
                    type="text"
                    class="form-control fw-bold"
                    id="paymentTotal"
                    value="₱0.00"
                    readonly>

            </div>

        </div>

    </div>

</div>
