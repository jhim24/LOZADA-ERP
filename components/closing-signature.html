<!-- ==========================================
     APPROVAL & SIGNATURE
========================================== -->

<div class="card shadow-sm mb-4">

    <div class="card-header bg-dark text-white">

        <h5 class="mb-0">

            <i class="fa-solid fa-signature"></i>

            Approval & Signatures

        </h5>

    </div>

    <div class="card-body">

        <div class="row g-4">

            <!-- CASHIER -->

            <div class="col-lg-4">

                <label class="form-label">

                    Cashier

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="cashierSignature"
                    placeholder="Cashier Name">

                <div class="border-bottom mt-5"></div>

                <small class="text-muted">

                    Cashier Signature

                </small>

            </div>

            <!-- SUPERVISOR -->

            <div class="col-lg-4">

                <label class="form-label">

                    Supervisor

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="supervisorSignature"
                    placeholder="Supervisor Name">

                <div class="border-bottom mt-5"></div>

                <small class="text-muted">

                    Supervisor Signature

                </small>

            </div>

            <!-- MANAGER -->

            <div class="col-lg-4">

                <label class="form-label">

                    Manager

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="managerSignature"
                    placeholder="Manager Name">

                <div class="border-bottom mt-5"></div>

                <small class="text-muted">

                    Manager Signature

                </small>

            </div>

        </div>

        <hr>

        <div class="row mt-3">

            <div class="col-lg-6">

                <button
                    class="btn btn-success w-100"
                    id="btnSaveClosing">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Save Closing Report

                </button>

            </div>

            <div class="col-lg-6">

                <button
                    class="btn btn-primary w-100"
                    id="btnPrintClosingReport">

                    <i class="fa-solid fa-print"></i>

                    Print Closing Report

                </button>

            </div>

        </div>

    </div>

</div>
