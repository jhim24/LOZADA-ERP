<!-- ==========================================
     SALES SUMMARY
========================================== -->

<div class="card shadow-sm mb-4">

    <div class="card-header bg-success text-white">

        <h5 class="mb-0">

            <i class="fa-solid fa-chart-line"></i>

            Sales Summary

        </h5>

    </div>

    <div class="card-body">

        <div class="row g-3">

            <div class="col-lg-2">

                <label class="form-label">

                    Total Transactions

                </label>

                <input
                    type="number"
                    class="form-control"
                    id="totalTransactions"
                    value="0"
                    readonly>

            </div>

            <div class="col-lg-2">

                <label class="form-label">

                    Total Items Sold

                </label>

                <input
                    type="number"
                    class="form-control"
                    id="totalItemsSold"
                    value="0"
                    readonly>

            </div>

            <div class="col-lg-2">

                <label class="form-label">

                    Gross Sales

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="grossSales"
                    value="₱0.00"
                    readonly>

            </div>

            <div class="col-lg-2">

                <label class="form-label">

                    Discount

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="discountAmount"
                    value="₱0.00"
                    readonly>

            </div>

            <div class="col-lg-2">

                <label class="form-label">

                    VAT

                </label>

                <input
                    type="text"
                    class="form-control"
                    id="vatAmount"
                    value="₱0.00"
                    readonly>

            </div>

            <div class="col-lg-2">

                <label class="form-label">

                    Net Sales

                </label>

                <input
                    type="text"
                    class="form-control fw-bold"
                    id="netSales"
                    value="₱0.00"
                    readonly>

            </div>

        </div>

    </div>

</div>
