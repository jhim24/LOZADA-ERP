<!-- ==========================================
LIVE KITCHEN MONITOR
========================================== -->

<div class="row">

    <!-- KITCHEN STATUS -->

    <div class="col-lg-8 mb-4">

        <div class="widget">

            <div class="widget-header d-flex justify-content-between align-items-center">

                <h4>

                    <i class="fa-solid fa-utensils"></i>

                    Kitchen Live Monitor

                </h4>

                <button
                    class="btn btn-success btn-sm">

                    Open Kitchen Display

                </button>

            </div>

            <div class="widget-body">

                <div class="table-responsive">

                    <table class="table table-hover">

                        <thead class="table-light">

                            <tr>

                                <th>Order No.</th>

                                <th>Table</th>

                                <th>Customer</th>

                                <th>Status</th>

                                <th>Waiting Time</th>

                            </tr>

                        </thead>

                        <tbody id="dashboardKitchenTable">

                            <tr>

                                <td colspan="5" class="text-center text-muted">

                                    No Kitchen Orders

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <!-- KITCHEN SUMMARY -->

    <div class="col-lg-4 mb-4">

        <div class="widget">

            <div class="widget-header">

                <h4>

                    <i class="fa-solid fa-fire"></i>

                    Kitchen Status

                </h4>

            </div>

            <div class="widget-body">

                <div class="list-group">

                    <div class="list-group-item d-flex justify-content-between">

                        Pending

                        <span id="dashboardKitchenPending">0</span>

                    </div>

                    <div class="list-group-item d-flex justify-content-between">

                        Preparing

                        <span id="dashboardKitchenPreparing">0</span>

                    </div>

                    <div class="list-group-item d-flex justify-content-between">

                        Ready

                        <span id="dashboardKitchenReady">0</span>

                    </div>

                    <div class="list-group-item d-flex justify-content-between">

                        Served

                        <span id="dashboardKitchenServed">0</span>

                    </div>

                    <div class="list-group-item d-flex justify-content-between">

                        Average Prep Time

                        <span id="dashboardKitchenAverage">0 min</span>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
