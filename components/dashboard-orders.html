<!-- ==========================================
EXECUTIVE DASHBOARD
========================================== -->

<div class="row">

    <!-- RECENT ORDERS -->

    <div class="col-lg-8 mb-4">

        <div class="widget">

            <div class="widget-header d-flex justify-content-between align-items-center">

                <h4>

                    <i class="fa-solid fa-receipt"></i>

                    Recent Orders

                </h4>

                <button
                    class="btn btn-primary btn-sm">

                    View All

                </button>

            </div>

            <div class="widget-body">

                <div class="table-responsive">

                    <table class="table table-hover align-middle">

                        <thead class="table-light">

                            <tr>

                                <th>Receipt</th>

                                <th>Table</th>

                                <th>Customer</th>

                                <th>Status</th>

                                <th>Total</th>

                            </tr>

                        </thead>

                        <tbody id="dashboardRecentOrders">

                            <tr>

                                <td colspan="5" class="text-center text-muted">

                                    No Orders Found

                                </td>

                            </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>

    <!-- QUICK STATS -->

    <div class="col-lg-4 mb-4">

        <div class="widget">

            <div class="widget-header">

                <h4>

                    <i class="fa-solid fa-bolt"></i>

                    Quick Status

                </h4>

            </div>

            <div class="widget-body">

                <div class="list-group">

                    <div class="list-group-item d-flex justify-content-between">

                        Pending Orders

                        <span id="dashboardPendingOrders">0</span>

                    </div>

                    <div class="list-group-item d-flex justify-content-between">

                        Kitchen Queue

                        <span id="dashboardKitchenQueue">0</span>

                    </div>

                    <div class="list-group-item d-flex justify-content-between">

                        Paid Orders

                        <span id="dashboardPaidOrders">0</span>

                    </div>

                    <div class="list-group-item d-flex justify-content-between">

                        Cancelled Orders

                        <span id="dashboardCancelledOrders">0</span>

                    </div>

                    <div class="list-group-item d-flex justify-content-between">

                        Total Customers

                        <span id="dashboardCustomerCount">0</span>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
