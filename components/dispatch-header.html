<!-- ==========================================
     DISPATCH HEADER
========================================== -->

<div class="dashboard-header mb-4">

    <div class="dashboard-title">

        <h1>

            <i class="fa-solid fa-truck-fast"></i>

            Dispatch Area

        </h1>

        <p>

            Ready Orders Waiting to be Served

        </p>

    </div>

</div>

<!-- ==========================================
     DISPATCH SUMMARY
========================================== -->

<div class="row g-4 mb-4">

    <div class="col-xl-4 col-md-6">

        <div class="kpi-card">

            <div class="kpi-info">

                <small>Ready Orders</small>

                <h2 id="dispatchReady">0</h2>

            </div>

            <div class="kpi-icon">

                <i class="fa-solid fa-bell-concierge"></i>

            </div>

        </div>

    </div>

    <div class="col-xl-4 col-md-6">

        <div class="kpi-card">

            <div class="kpi-info">

                <small>Food Served</small>

                <h2 id="dispatchServed">0</h2>

            </div>

            <div class="kpi-icon">

                <i class="fa-solid fa-circle-check"></i>

            </div>

        </div>

    </div>

    <div class="col-xl-4 col-md-12">

        <div class="kpi-card">

            <div class="kpi-info">

                <small>Total Dispatch</small>

                <h2 id="dispatchTotal">0</h2>

            </div>

            <div class="kpi-icon">

                <i class="fa-solid fa-truck"></i>

            </div>

        </div>

    </div>

</div>
