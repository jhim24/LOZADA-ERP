<!-- ==========================================
     ORDER HISTORY HEADER
========================================== -->

<div class="container-fluid mb-4">

    <div class="d-flex justify-content-between align-items-center flex-wrap">

        <div>

            <h2 class="fw-bold mb-1">

                <i class="fa-solid fa-clock-rotate-left text-primary"></i>

                Order History

            </h2>

            <small class="text-muted">

                Completed & Archived Orders

            </small>

        </div>

        <div class="d-flex gap-2 flex-wrap">

            <input
                type="text"
                class="form-control"
                id="historySearch"
                placeholder="Search Receipt / Customer..."
                style="width:260px;">

            <input
                type="date"
                class="form-control"
                id="historyDate">

            <button
                class="btn btn-success"
                id="btnExportHistory">

                <i class="fa-solid fa-file-excel"></i>

                Export

            </button>

            <button
                class="btn btn-primary"
                id="btnPrintHistory">

                <i class="fa-solid fa-print"></i>

                Print

            </button>

        </div>

    </div>

    <hr>

    <div class="row mt-3">

        <div class="col-md-3">

            <div class="card shadow-sm">

                <div class="card-body text-center">

                    <h6>Total Orders</h6>

                    <h2 id="historyTotalOrders">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow-sm">

                <div class="card-body text-center">

                    <h6>Total Sales</h6>

                    <h2 id="historyTotalSales">

                        ₱0.00

                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow-sm">

                <div class="card-body text-center">

                    <h6>Paid Orders</h6>

                    <h2 id="historyPaidOrders">

                        0

                    </h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow-sm">

                <div class="card-body text-center">

                    <h6>Cancelled</h6>

                    <h2 id="historyCancelledOrders">

                        0

                    </h2>

                </div>

            </div>

        </div>

    </div>

</div>
