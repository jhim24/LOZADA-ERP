<!-- ==========================================
     OPERATION CENTER BOARD
========================================== -->

<div class="row g-3">

    <!-- PENDING -->

    <div class="col-xl-2 col-lg-4 col-md-6">

        <div class="card shadow-sm h-100">

            <div class="card-header bg-warning text-dark">

                <h5 class="mb-0">

                    🟡 Pending

                </h5>

            </div>

            <div class="card-body">

                <div id="pendingBoard">

                    <div class="alert alert-light text-center mb-0">

                        No Pending Orders

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- PREPARING -->

    <div class="col-xl-2 col-lg-4 col-md-6">

        <div class="card shadow-sm h-100">

            <div class="card-header bg-danger text-white">

                <h5 class="mb-0">

                    🔥 Preparing

                </h5>

            </div>

            <div class="card-body">

                <div id="preparingBoard">

                    <div class="alert alert-light text-center mb-0">

                        No Preparing Orders

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- READY -->

    <div class="col-xl-2 col-lg-4 col-md-6">

        <div class="card shadow-sm h-100">

            <div class="card-header bg-success text-white">

                <h5 class="mb-0">

                    🟢 Ready

                </h5>

            </div>

            <div class="card-body">

                <div id="readyBoard">

                    <div class="alert alert-light text-center mb-0">

                        No Ready Orders

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- SERVED -->

    <div class="col-xl-3 col-lg-6 col-md-6">

        <div class="card shadow-sm h-100">

            <div class="card-header bg-primary text-white">

                <h5 class="mb-0">

                    🔵 Served

                </h5>

            </div>

            <div class="card-body">

                <div id="servedBoard">

                    <div class="alert alert-light text-center mb-0">

                        No Served Orders

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- PAID -->

    <div class="col-xl-3 col-lg-6 col-md-12">

        <div class="card shadow-sm h-100">

            <div class="card-header bg-dark text-white">

                <h5 class="mb-0">

                    ⚫ Paid

                </h5>

            </div>

            <div class="card-body">

                <div id="paidBoard">

                    <div class="alert alert-light text-center mb-0">

                        No Paid Orders

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
