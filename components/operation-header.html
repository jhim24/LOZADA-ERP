<!-- ==========================================
     OPERATION CENTER HEADER
========================================== -->

<div class="dashboard-header mb-4">

    <div class="dashboard-title">

        <h1>

            <i class="fa-solid fa-chart-simple"></i>

            Restaurant Operation Center

        </h1>

        <p>

            Real-Time Restaurant Monitoring Dashboard

        </p>

    </div>

</div>

<!-- ==========================================
     LIVE STATUS SUMMARY
========================================== -->

<div class="row g-4 mb-4">

    <div class="col-xl col-lg-4 col-md-6">

        <div class="kpi-card border-start border-warning border-5">

            <div class="kpi-info">

                <small>Pending</small>

                <h2 id="pendingCount">0</h2>

            </div>

            <div class="kpi-icon">

                <i class="fa-solid fa-hourglass-half"></i>

            </div>

        </div>

    </div>

    <div class="col-xl col-lg-4 col-md-6">

        <div class="kpi-card border-start border-danger border-5">

            <div class="kpi-info">

                <small>Preparing</small>

                <h2 id="preparingCount">0</h2>

            </div>

            <div class="kpi-icon">

                <i class="fa-solid fa-fire-burner"></i>

            </div>

        </div>

    </div>

    <div class="col-xl col-lg-4 col-md-6">

        <div class="kpi-card border-start border-success border-5">

            <div class="kpi-info">

                <small>Ready</small>

                <h2 id="readyCount">0</h2>

            </div>

            <div class="kpi-icon">

                <i class="fa-solid fa-bell-concierge"></i>

            </div>

        </div>

    </div>

    <div class="col-xl col-lg-4 col-md-6">

        <div class="kpi-card border-start border-primary border-5">

            <div class="kpi-info">

                <small>Served</small>

                <h2 id="servedCount">0</h2>

            </div>

            <div class="kpi-icon">

                <i class="fa-solid fa-check-double"></i>

            </div>

        </div>

    </div>

    <div class="col-xl col-lg-4 col-md-6">

        <div class="kpi-card border-start border-dark border-5">

            <div class="kpi-info">

                <small>Paid</small>

                <h2 id="paidCount">0</h2>

            </div>

            <div class="kpi-icon">

                <i class="fa-solid fa-money-bill-wave"></i>

            </div>

        </div>

    </div>

</div>
