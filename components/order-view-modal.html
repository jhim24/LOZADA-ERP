<!-- ==========================================
     ORDER VIEW MODAL
========================================== -->

<div class="modal fade"
     id="orderViewModal"
     tabindex="-1">

    <div class="modal-dialog modal-xl modal-dialog-scrollable">

        <div class="modal-content">

            <div class="modal-header bg-primary text-white">

                <h5 class="modal-title">

                    <i class="fa-solid fa-receipt"></i>

                    Order Details

                </h5>

                <button
                    class="btn-close btn-close-white"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <!-- ORDER INFORMATION -->

                <div class="row mb-4">

                    <div class="col-md-3">

                        <strong>Receipt No.</strong>

                        <div id="viewReceiptNo">-</div>

                    </div>

                    <div class="col-md-3">

                        <strong>Date</strong>

                        <div id="viewDate">-</div>

                    </div>

                    <div class="col-md-3">

                        <strong>Status</strong>

                        <div id="viewStatus">-</div>

                    </div>

                    <div class="col-md-3">

                        <strong>Cashier</strong>

                        <div id="viewCashier">-</div>

                    </div>

                </div>

                <div class="row mb-4">

                    <div class="col-md-4">

                        <strong>Customer</strong>

                        <div id="viewCustomer">-</div>

                    </div>

                    <div class="col-md-4">

                        <strong>Table</strong>

                        <div id="viewTable">-</div>

                    </div>

                    <div class="col-md-4">

                        <strong>Order Type</strong>

                        <div id="viewOrderType">-</div>

                    </div>

                </div>

                <!-- ORDER ITEMS -->

                <div class="table-responsive">

                    <table class="table table-bordered">

                        <thead class="table-dark">

                            <tr>

                                <th width="70">Qty</th>

                                <th>Product</th>

                                <th width="120">Price</th>

                                <th width="120">Total</th>

                            </tr>

                        </thead>

                        <tbody id="viewOrderItems">

                        </tbody>

                    </table>

                </div>

                <!-- TOTALS -->

              <div class="row mt-4">

    <div class="col-md-6">

        <table class="table table-bordered">

            <tr>

                <th>Payment Method</th>

                <td id="viewPayment">-</td>

            </tr>

            <tr>

                <th>Cashier</th>

                <td id="viewCashierName">-</td>

            </tr>

            <tr>

                <th>Server</th>

                <td id="viewServer">-</td>

            </tr>

            <tr>

                <th>Guests</th>

                <td id="viewGuests">-</td>

            </tr>

            <tr>

                <th>Floor</th>

                <td id="viewFloor">-</td>

            </tr>

        </table>

    </div>

    <div class="col-md-6">

        <table class="table table-bordered">

            <tr>

                <th>Subtotal</th>

                <td class="text-end" id="viewSubtotal">

                    ₱0.00

                </td>

            </tr>

            <tr>

                <th>Grand Total</th>

                <td class="text-end fw-bold fs-5 text-success"
                    id="viewGrandTotal">

                    ₱0.00

                </td>

            </tr>

        </table>

    </div>

</div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    <i class="fa-solid fa-xmark"></i>

                    Close

                </button>

                <button
                    class="btn btn-primary"
                    id="btnPrintOrderReceipt">

                    <i class="fa-solid fa-print"></i>

                    Print Receipt

                </button>

            </div>

        </div>

    </div>

</div>
