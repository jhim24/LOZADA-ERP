<!-- ==========================================
     SHOPPING CART
========================================== -->

<div class="widget">

    <div class="widget-header">

        <div class="cart-header-left">

            <i class="fa-solid fa-cart-shopping"></i>

            <div>

                <h4>SHOPPING CART</h4>

                <small>Dine-in Order</small>

            </div>

        </div>

        <span class="cart-badge" id="cartCount">

            0 Item(s)

        </span>

    </div>

    <!-- DINE-IN INFO -->

    <div class="cart-info">

        <div class="info-box">

            <i class="fa-solid fa-chair"></i>

            <div>

                <small>TABLE</small>

                <h6>

                    <span id="paymentFloor">-</span> -

                    <span id="paymentTable">-</span>

                </h6>

            </div>

        </div>

        <div class="info-box">

            <i class="fa-solid fa-user"></i>

            <div>

                <small>CUSTOMER</small>

                <h6 id="paymentCustomer">

                    Walk-in

                </h6>

            </div>

        </div>

        <div class="info-box">

            <i class="fa-solid fa-users"></i>

            <div>

                <small>GUESTS</small>

                <h6 id="paymentGuests">

                    1

                </h6>

            </div>

        </div>

        <div class="info-box">

            <i class="fa-solid fa-user-tie"></i>

            <div>

                <small>SERVER</small>

                <h6 id="paymentServer">

                    -

                </h6>

            </div>

        </div>

    </div>

    <div class="table-responsive">

        <table class="table cart-table align-middle">

            <thead>

                <tr>

<th width="40%">ITEM</th>
<th width="18%">QTY</th>
<th width="15%">PRICE</th>
<th width="17%">TOTAL</th>
<th width="10%">ACTION</th>

                </tr>

            </thead>

            <tbody id="cartItems">

                <tr>

                    <td colspan="4" class="text-center text-muted">

                        Cart is Empty

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

    <div class="cart-summary">

        <div>

            <strong>SUBTOTAL</strong>

            <strong id="subtotal">₱0.00</strong>

        </div>

        <div>

            <strong>VAT (12%)</strong>

            <strong id="vat">₱0.00</strong>

        </div>

        <div class="grand-total">

            <span>TOTAL</span>

            <span id="grandTotal">₱0.00</span>

        </div>

    </div>

</div>
