<!-- ==========================================
     LOZADA ERP POS HEADER
========================================== -->

<header class="pos-header">

    <div class="pos-logo">

        <i class="fa-solid fa-cash-register"></i>

        <div>

            <h2>LOZADA ERP POS</h2>

            <small>Restaurant Point of Sale</small>

        </div>

    </div>

    <div class="pos-search">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input
            type="text"
            id="searchProduct"
            placeholder="Search product...">

    </div>

    <div class="pos-info">

        <div class="info-card">

            <small>Branch</small>

            <strong>Main Branch</strong>

        </div>

        <div class="info-card">

            <small>Cashier</small>

            <strong>John Admin</strong>

        </div>

        <div class="info-card">

            <small>Date</small>

            <strong id="currentDate">29 Jun 2026</strong>

        </div>

        <div class="info-card">

            <small>Time</small>

            <strong id="currentTime">00:00:00</strong>

        </div>

    </div>

</header>

<!-- ORDER TYPE -->

<section class="order-type">

    <button class="order-btn active">

        <i class="fa-solid fa-utensils"></i>

        Dine In

    </button>

    <button class="order-btn">

        <i class="fa-solid fa-bag-shopping"></i>

        Take Out

    </button>

    <button class="order-btn">

        <i class="fa-solid fa-motorcycle"></i>

        Delivery

    </button>

</section>
