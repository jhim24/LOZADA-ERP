<!-- ==========================================
     POS PAYMENT
========================================== -->

<section class="payment-panel">

    <div class="payment-header">

        <h4>
            <i class="fa-solid fa-credit-card"></i>
            Payment
        </h4>

    </div>

    <div class="payment-body">
<!-- ==========================================
     TABLE INFORMATION
========================================== -->

<div class="card mb-3 border-primary">

    <div class="card-header bg-primary text-white">

        <i class="fa-solid fa-chair"></i>

        Table Information

    </div>

    <div class="card-body">

        <div class="row mb-2">

            <div class="col-5">

                <strong>Floor</strong>

            </div>

            <div class="col-7 text-end">

                <span id="paymentFloor">-</span>

            </div>

        </div>

        <div class="row mb-2">

            <div class="col-5">

                <strong>Table</strong>

            </div>

            <div class="col-7 text-end">

                <span id="paymentTable">-</span>

            </div>

        </div>

        <div class="row mb-2">

            <div class="col-5">

                <strong>Customer</strong>

            </div>

            <div class="col-7 text-end">

                <span id="paymentCustomer">

                    Walk-in

                </span>

            </div>

        </div>

        <div class="row mb-2">

            <div class="col-5">

                <strong>Guests</strong>

            </div>

            <div class="col-7 text-end">

                <span id="paymentGuests">

                    1

                </span>

            </div>

        </div>

        <div class="row">

            <div class="col-5">

                <strong>Server</strong>

            </div>

            <div class="col-7 text-end">

                <span id="paymentServer">

                    -

                </span>

            </div>

        </div>

    </div>

</div>
         <!-- ==========================================
     ORDER SUMMARY
========================================== -->

<div class="card mb-3 border-success">

    <div class="card-header bg-success text-white">

        <i class="fa-solid fa-cart-shopping"></i>

        Order Summary

    </div>

    <div class="card-body">

        <div class="d-flex justify-content-between">

            <strong>Total Items</strong>

            <span id="summaryItems">0</span>

        </div>
<hr>

<div class="d-flex justify-content-between mb-2">

    <strong>Subtotal</strong>

    <span id="summarySubtotal">

        ₱0.00

    </span>

</div>

<div class="d-flex justify-content-between mb-2">

    <strong>VAT (12%)</strong>

    <span id="summaryVat">

        ₱0.00

    </span>

</div>

<div class="d-flex justify-content-between mb-2">

    <strong>Discount</strong>

    <span id="summaryDiscount">

        ₱0.00

    </span>

</div>

<hr>

<div class="d-flex justify-content-between">

    <h5>

        Grand Total

    </h5>

    <h5 id="summaryGrandTotal">

        ₱0.00

    </h5>

</div>
    </div>

</div>
        <div class="mb-3">

            <label>Total Amount</label>

            <input
                type="text"
                id="totalAmount"
                class="form-control"
                value="1047.20"
                readonly>

        </div>

        <div class="mb-3">

            <label>Payment Method</label>

            <select id="paymentMethod" class="form-select">

                <option>Cash</option>

                <option>Credit Card</option>

                <option>Debit Card</option>

                <option>GCash</option>

                <option>Maya</option>

                <option>Bank Transfer</option>

            </select>

        </div>

        <div class="mb-3">

            <label>Cash Received</label>

            <input
                type="number"
                id="cashReceived"
                class="form-control"
                placeholder="Enter amount">

        </div>

        <div class="mb-3">

            <label>Change</label>

            <input
                type="text"
                id="changeAmount"
                class="form-control"
                value="0.00"
                readonly>

        </div>

        <button
            id="btnCompute"
            class="btn btn-warning w-100 mb-2">

            <i class="fa-solid fa-calculator"></i>

            Compute Change

        </button>
<button
    class="btn btn-warning w-100 mt-3"
    id="btnSendKitchen">

    <i class="fa-solid fa-utensils"></i>

    Send to Kitchen

</button>
      
       <button
    class="btn btn-success w-100 mt-2"
    id="btnReceivePayment">

    <i class="fa-solid fa-money-bill-wave"></i>

    Receive Payment

</button>

    </div>

</section>
