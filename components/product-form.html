<!-- ==========================================
     PRODUCT FORM
========================================== -->

<div class="card shadow product-card">

   <div class="card-header product-card-header">
        <h5 class="mb-0">

            <i class="fa-solid fa-box"></i>

            Product Management

        </h5>

    </div>

  <div class="card-body product-card-body">

<div class="row">

<div class="col-lg-7">

        <!-- PRODUCT CODE -->

        <div class="mb-3">

            <label class="form-label">

                Product Code

            </label>

            <input
                type="text"
                class="form-control"
                id="productCode"
                value="PRD-0001"
                readonly>

        </div>

        <!-- CATEGORY -->

        <div class="mb-3">

            <label class="form-label">

                Category

            </label>

            <select
                class="form-select"
                id="productCategory">

                <option value="">Loading Categories...</option>

            </select>

        </div>

        <!-- PRODUCT NAME -->

        <div class="mb-3">

            <label class="form-label">

                Product Name

            </label>

            <input
                type="text"
                class="form-control"
                id="productName"
                placeholder="Enter Product Name">

        </div>

        <!-- SELLING PRICE -->

        <div class="mb-3">

            <label class="form-label">

                Selling Price

            </label>

            <input
                type="number"
                class="form-control"
                id="sellingPrice"
                placeholder="0.00">

        </div>

        <!-- COST -->

        <div class="mb-3">

            <label class="form-label">

                Cost Price

            </label>

            <input
                type="number"
                class="form-control"
                id="costPrice"
                placeholder="0.00">

        </div>

        <!-- BARCODE -->

        <div class="mb-3">

            <label class="form-label">

                Barcode

            </label>

            <input
                type="text"
                class="form-control"
                id="barcode"
                placeholder="Barcode">

        </div>
<!-- Product Image moved to right panel -->
     
<!-- STATUS -->

<div class="mb-4">

    <label class="form-label">

        Status

    </label>

    <select
        class="form-select"
        id="productStatus">

        <option value="Active">Active</option>

        <option value="Inactive">Inactive</option>

    </select>

</div>

</div>

    </div>

</div>

<div class="col-lg-5">

    <div class="product-image-card">

    <!-- PRODUCT IMAGE -->

    <div class="text-center mb-4">

      <img
    id="imagePreview"
    src="https://via.placeholder.com/250x250?text=No+Image"
    class="img-fluid rounded shadow border"
    style="
        width:250px;
        height:250px;
        object-fit:cover;
        background:#fff;
        padding:5px;
    "
/>

    </div>

    <div class="mb-3">

        <label class="form-label">

            Upload Product Image

        </label>

        <input

            type="file"

            class="form-control"

            id="productImage"

            accept="image/*">

    </div>

    <div class="mb-4">

        <label class="form-label">

            Image URL

        </label>

        <input

            type="url"

            class="form-control"

            id="productImageUrl"

            placeholder="https://example.com/product.jpg">

    </div>

    <hr>

    <div class="d-grid gap-2">

        <button

            class="btn btn-primary"

            id="btnSaveProduct">

            <i class="fa-solid fa-floppy-disk"></i>

            Save Product

        </button>

        <button

            class="btn btn-warning"

            id="btnUpdateProduct"

            style="display:none;">

            <i class="fa-solid fa-pen"></i>

            Update Product

        </button>

        <button

            class="btn btn-secondary"

            id="btnClearProduct">

            <i class="fa-solid fa-rotate"></i>

            Clear

        </button>

      </div>

</div>

<!-- DESCRIPTION -->

<div class="row mt-4">

    <div class="col-12">

        <div class="mb-0">

            <label class="form-label">

                Description

            </label>

            <textarea
                class="form-control"
                rows="4"
                id="productDescription"
                placeholder="Product Description"></textarea>

        </div>

    </div>

</div>

</div>

</div>
