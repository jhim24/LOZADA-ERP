<!-- ==========================================
     PRODUCT FORM
========================================== -->

<div class="card shadow product-card">

   <div class="card-header product-card-header">
        <h5 class="mb-0">

            <i class="fa-solid fa-box"></i>

            Product Management

        </h5>

    </div>

  <div class="card-body product-card-body">

<div class="row">

<div class="col-lg-8">

        <!-- PRODUCT CODE -->

        <div class="mb-3">

            <label class="form-label">

                Product Code

            </label>

            <input
                type="text"
                class="form-control"
                id="productCode"
                value="PRD-0001"
                readonly>

        </div>

        <!-- CATEGORY -->

        <div class="mb-3">

            <label class="form-label">

                Category

            </label>

            <select
                class="form-select"
                id="productCategory">

                <option value="">Loading Categories...</option>

            </select>

        </div>

        <!-- PRODUCT NAME -->

        <div class="mb-3">

            <label class="form-label">

                Product Name

            </label>

            <input
                type="text"
                class="form-control"
                id="productName"
                placeholder="Enter Product Name">

        </div>

        <!-- SELLING PRICE -->

        <div class="mb-3">

            <label class="form-label">

                Selling Price

            </label>

            <input
                type="number"
                class="form-control"
                id="sellingPrice"
                placeholder="0.00">

        </div>

        <!-- COST -->

        <div class="mb-3">

            <label class="form-label">

                Cost Price

            </label>

            <input
                type="number"
                class="form-control"
                id="costPrice"
                placeholder="0.00">

        </div>

        <!-- BARCODE -->

        <div class="mb-3">

            <label class="form-label">

                Barcode

            </label>

            <input
                type="text"
                class="form-control"
                id="barcode"
                placeholder="Barcode">

        </div>

      <!-- ==========================================
PRODUCT IMAGE
========================================== -->

<div class="mb-3">

    <label class="form-label">

        Product Image (Upload)

    </label>

    <input
        type="file"
        class="form-control"
        id="productImage"
        accept="image/*">

</div>

<div class="mb-3">

    <label class="form-label">

        Or Image URL

    </label>

    <input
        type="url"
        class="form-control"
        id="productImageUrl"
        placeholder="https://example.com/product.jpg">

</div>

<div class="text-center mb-3">

    <img

        id="imagePreview"

        src="https://via.placeholder.com/180x180?text=No+Image"

        style="

            width:180px;

            height:180px;

            object-fit:cover;

            border-radius:12px;

            border:1px solid #ddd;

            padding:4px;

            background:#fff;

        ">

</div>
<!-- DESCRIPTION -->

<div class="mb-3">

    <label class="form-label">

        Description

    </label>

    <textarea
        class="form-control"
        rows="3"
        id="productDescription"
        placeholder="Product Description"></textarea>

</div>
        <!-- STATUS -->

        <div class="mb-4">

            <label class="form-label">

                Status

            </label>

            <select
                class="form-select"
                id="productStatus">

                <option value="Active">Active</option>

                <option value="Inactive">Inactive</option>

            </select>

        </div>
</div>

<div class="col-lg-4">
        <!-- BUTTONS -->

        <div class="d-grid gap-2">

            <button
                class="btn btn-primary"
                id="btnSaveProduct">

                <i class="fa-solid fa-floppy-disk"></i>

                Save Product

            </button>

           <button
class="btn btn-warning"
id="btnUpdateProduct"
style="display:none;">

<i class="fa-solid fa-pen"></i>

Update Product

</button>
            <button
                class="btn btn-secondary"
                id="btnClearProduct">

                <i class="fa-solid fa-rotate"></i>

                Clear

            </button>

                </div>

    </div>

</div>

</div>
