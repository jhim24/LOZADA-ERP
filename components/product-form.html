<!-- ==========================================
     PRODUCT FORM
========================================== -->

<div class="card shadow product-card">

   <div class="card-header product-card-header">
        <h5 class="mb-0">

            <i class="fa-solid fa-box"></i>

            Product Management

        </h5>

    </div>

 <div class="card-body product-card-body">

    <!-- ==========================
         ROW 1 : PRODUCT DETAILS
    =========================== -->

    <div class="row g-3">

        <div class="col-lg-2">

            <label class="form-label">Product Code</label>

            <input
                type="text"
                class="form-control"
                id="productCode"
                readonly>

        </div>

        <div class="col-lg-2">

            <label class="form-label">Category</label>

            <select
                class="form-select"
                id="productCategory">

                <option value="">Loading...</option>

            </select>

        </div>

        <div class="col-lg-3">

            <label class="form-label">Product Name</label>

            <input
                type="text"
                class="form-control"
                id="productName"
                placeholder="Product Name">

        </div>

        <div class="col-lg-1">

            <label class="form-label">Selling</label>

            <input
                type="number"
                class="form-control"
                id="sellingPrice"
                placeholder="0">

        </div>

        <div class="col-lg-1">

            <label class="form-label">Cost</label>

            <input
                type="number"
                class="form-control"
                id="costPrice"
                placeholder="0">

        </div>

        <div class="col-lg-2">

            <label class="form-label">Barcode</label>

            <input
                type="text"
                class="form-control"
                id="barcode"
                placeholder="Barcode">

        </div>

        <div class="col-lg-1">

            <label class="form-label">Status</label>

            <select
                class="form-select"
                id="productStatus">

                <option value="Active">Active</option>

                <option value="Inactive">Inactive</option>

            </select>

        </div>

    </div>

    <!-- ==========================
         ROW 2 : IMAGE + BUTTONS
    =========================== -->

    <div class="row mt-4 align-items-center">

        <div class="col-lg-2 text-center">

            <img
                id="imagePreview"
                src="https://via.placeholder.com/180x180?text=No+Image"
                class="img-fluid rounded shadow border">

        </div>

        <div class="col-lg-4">

            <label class="form-label">

                Upload Product Image

            </label>

            <input
                type="file"
                class="form-control"
                id="productImage"
                accept="image/*">

        </div>

        <div class="col-lg-3">

            <label class="form-label">

                Image URL

            </label>

            <input
                type="url"
                class="form-control"
                id="productImageUrl"
                placeholder="https://example.com/image.jpg">

        </div>

        <div class="col-lg-3">

            <div class="d-grid gap-2">

                <button
                    class="btn btn-primary"
                    id="btnSaveProduct">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Save Product

                </button>

                <button
                    class="btn btn-warning"
                    id="btnUpdateProduct"
                    style="display:none;">

                    <i class="fa-solid fa-pen"></i>

                    Update Product

                </button>

                <button
                    class="btn btn-secondary"
                    id="btnClearProduct">

                    <i class="fa-solid fa-rotate"></i>

                    Clear

                </button>

            </div>

        </div>

    </div>

    <!-- ==========================
         ROW 3 : DESCRIPTION
    =========================== -->

    <div class="row mt-4">

        <div class="col-12">

            <label class="form-label">

                Description

            </label>

            <textarea
                class="form-control"
                id="productDescription"
                rows="4"
                placeholder="Product Description"></textarea>

        </div>

    </div>

</div>
