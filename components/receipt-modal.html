<!-- ==========================================
     RECEIPT MODAL
========================================== -->

<div class="modal fade" id="receiptModal" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5>

                    <i class="fa-solid fa-receipt"></i>

                    Sales Receipt

                </h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body receipt">

                <div class="text-center">

                    <h3>LOZADA ERP</h3>

                    <strong>Restaurant POS</strong>

                    <p>
                        Main Branch
                    </p>

                    <hr>

                </div>

                <table class="table table-borderless">

                    <tr>

                        <td>Receipt No.</td>

                        <td class="text-end">000001</td>

                    </tr>

                    <tr>

                        <td>Date</td>

                        <td class="text-end" id="receiptDate"></td>

                    </tr>

                    <tr>

                        <td>Cashier</td>

                        <td class="text-end">John Admin</td>

                    </tr>

                </table>

                <hr>

                <table class="table table-sm">

                    <thead>

                        <tr>

                            <th>Item</th>

                            <th class="text-center">Qty</th>

                            <th class="text-end">Amount</th>

                        </tr>

                    </thead>

                    <tbody id="receiptItems">

                        <tr>

                            <td>Bulalo Solo</td>

                            <td class="text-center">1</td>

                            <td class="text-end">185.00</td>

                        </tr>

                        <tr>

                            <td>Pork Sisig</td>

                            <td class="text-center">2</td>

                            <td class="text-end">630.00</td>

                        </tr>

                    </tbody>

                </table>

                <hr>

                <table class="table table-borderless">

                    <tr>

                        <td>Subtotal</td>

                        <td class="text-end">935.00</td>

                    </tr>

                    <tr>

                        <td>VAT</td>

                        <td class="text-end">112.20</td>

                    </tr>

                    <tr>

                        <td><strong>Total</strong></td>

                        <td class="text-end">

                            <strong>1047.20</strong>

                        </td>

                    </tr>

                    <tr>

                        <td>Cash</td>

                        <td class="text-end">1100.00</td>

                    </tr>

                    <tr>

                        <td>Change</td>

                        <td class="text-end">52.80</td>

                    </tr>

                </table>

                <hr>

                <div class="text-center">

                    Thank you for dining with us!

                    <br>

                    Please come again.

                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Close

                </button>

                <button
                    class="btn btn-success"
                    onclick="window.print()">

                    <i class="fa-solid fa-print"></i>

                    Print Receipt

                </button>

            </div>

        </div>

    </div>

</div>
