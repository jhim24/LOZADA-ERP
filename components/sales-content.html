<!-- ==========================================
     SALES DASHBOARD
========================================== -->

<div class="container-fluid">

    <div class="row mb-4">

        <div class="col-md-3">

            <div class="card border-success shadow-sm">

                <div class="card-body">

                    <h6 class="text-muted">

                        Today's Sales

                    </h6>

                    <h3 id="todaySales">

                        ₱0.00

                    </h3>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card border-primary shadow-sm">

                <div class="card-body">

                    <h6 class="text-muted">

                        Today's Orders

                    </h6>

                    <h3 id="todayOrders">

                        0

                    </h3>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card border-warning shadow-sm">

                <div class="card-body">

                    <h6 class="text-muted">

                        Customers

                    </h6>

                    <h3 id="todayCustomers">

                        0

                    </h3>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card border-danger shadow-sm">

                <div class="card-body">

                    <h6 class="text-muted">

                        Average Sale

                    </h6>

                    <h3 id="averageSale">

                        ₱0.00

                    </h3>

                </div>

            </div>

        </div>

    </div>

    <!-- FILTER -->

    <div class="card mb-3">

        <div class="card-body">

            <div class="row">

                <div class="col-md-3">

                    <input
                        type="date"
                        id="fromDate"
                        class="form-control">

                </div>

                <div class="col-md-3">

                    <input
                        type="date"
                        id="toDate"
                        class="form-control">

                </div>

                <div class="col-md-4">

                    <input
                        type="text"
                        id="searchSales"
                        class="form-control"
                        placeholder="Search Receipt / Customer / Table">

                </div>

                <div class="col-md-2">

                    <button
                        class="btn btn-primary w-100"
                        id="btnFilterSales">

                        Filter

                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- SALES TABLE -->

    <div class="card">

        <div class="table-responsive">

            <table class="table table-hover align-middle mb-0">

                <thead class="table-dark">

                    <tr>

                        <th>Receipt</th>

                        <th>Date</th>

                        <th>Table</th>

                        <th>Customer</th>

                        <th>Payment</th>

                        <th>Total</th>

                        <th width="180">Action</th>

                    </tr>

                </thead>

                <tbody id="salesTableBody">

                    <tr>

                        <td colspan="7" class="text-center text-muted">

                            No Sales Record

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
