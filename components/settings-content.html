<!-- ==========================================
     COMPANY PROFILE
========================================== -->

<div class="card shadow-sm border-0">

    <div class="card-header bg-primary text-white">

        <h5 class="mb-0">

            <i class="fa-solid fa-building"></i>

            Company Profile

        </h5>

    </div>

    <div class="card-body">

        <div class="row">

            <div class="col-md-6 mb-3">

                <label class="form-label">

                    Restaurant Name

                </label>

                <input
                type="text"
                class="form-control"
                id="companyName">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">

                    Company Logo

                </label>

               <input
type="file"
class="form-control"
id="companyLogo"
accept="image/*">

<div class="text-center mt-3">

    <img
    id="companyLogoPreview"
    src="https://via.placeholder.com/180x180?text=LOGO"
    class="img-thumbnail"
    style="max-width:180px;max-height:180px;">

</div>

            </div>

            <div class="col-md-12 mb-3">

                <label class="form-label">

                    Address

                </label>

                <textarea
                class="form-control"
                id="companyAddress"
                rows="2"></textarea>

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">

                    Contact Number

                </label>

                <input
                type="text"
                class="form-control"
                id="companyContact">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">

                    Email Address

                </label>

                <input
                type="email"
                class="form-control"
                id="companyEmail">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">

                    Website

                </label>

                <input
                type="text"
                class="form-control"
                id="companyWebsite">

            </div>

            <div class="col-md-3 mb-3">

                <label class="form-label">

                    TIN Number

                </label>

                <input
                type="text"
                class="form-control"
                id="companyTIN">

            </div>

            <div class="col-md-3 mb-3">

                <label class="form-label">

                    VAT Number

                </label>

                <input
                type="text"
                class="form-control"
                id="companyVAT">

            </div>

        </div>

    </div>

</div>
