<!-- ==========================================
     SETTINGS HEADER
========================================== -->

<div class="card shadow-sm border-0 mb-4">

    <div class="card-body">

        <div class="d-flex justify-content-between align-items-center flex-wrap">

            <div>

                <h2 class="fw-bold mb-1">

                    <i class="fa-solid fa-gear text-primary"></i>

                    Settings

                </h2>

                <small class="text-muted">

                    Configure your Restaurant ERP System

                </small>

            </div>

            <div>

                <button
                class="btn btn-primary"
                id="btnSaveSettings">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Save Settings

                </button>

            </div>

        </div>

    </div>

</div>

<div class="row g-3 mb-4">

    <div class="col-lg-2 col-md-4 col-6">

        <button class="btn btn-outline-primary w-100 settings-tab active"
        data-tab="company">

            <i class="fa-solid fa-building d-block mb-2"></i>

            Company

        </button>

    </div>

    <div class="col-lg-2 col-md-4 col-6">

        <button class="btn btn-outline-primary w-100 settings-tab"
        data-tab="restaurant">

            <i class="fa-solid fa-utensils d-block mb-2"></i>

            Restaurant

        </button>

    </div>

    <div class="col-lg-2 col-md-4 col-6">

        <button class="btn btn-outline-primary w-100 settings-tab"
        data-tab="receipt">

            <i class="fa-solid fa-receipt d-block mb-2"></i>

            Receipt

        </button>

    </div>

    <div class="col-lg-2 col-md-4 col-6">

        <button class="btn btn-outline-primary w-100 settings-tab"
        data-tab="payment">

            <i class="fa-solid fa-credit-card d-block mb-2"></i>

            Payment

        </button>

    </div>

    <div class="col-lg-2 col-md-4 col-6">

        <button class="btn btn-outline-primary w-100 settings-tab"
        data-tab="inventory">

            <i class="fa-solid fa-boxes-stacked d-block mb-2"></i>

            Inventory

        </button>

    </div>

    <div class="col-lg-2 col-md-4 col-6">

        <button class="btn btn-outline-primary w-100 settings-tab"
        data-tab="system">

            <i class="fa-solid fa-server d-block mb-2"></i>

            System

        </button>

    </div>

</div>
