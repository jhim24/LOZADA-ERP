<!-- ==========================================
     ADD / EDIT TABLE MODAL
========================================== -->

<div class="modal fade" id="tableFormModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header bg-primary text-white">

                <h5 class="modal-title" id="tableFormTitle">

                    Add Table

                </h5>

                <button
                class="btn-close btn-close-white"
                data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                <div class="mb-3">

                    <label class="form-label">

                        Floor

                    </label>

                    <select
                    id="tableFloor"
                    class="form-select">

                        <option>Rooftop</option>

                        <option>Main Dining</option>

                        <option>Basement</option>

                        <option>VIP Room</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Table Name

                    </label>

                    <input
                    type="text"
                    id="tableName"
                    class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Number of Seats

                    </label>

                    <input
                    type="number"
                    id="tableSeats"
                    class="form-control"
                    value="4">

                </div>

            </div>

            <div class="modal-footer">

                <button
                class="btn btn-secondary"
                data-bs-dismiss="modal">

                    Cancel

                </button>

                <button
                class="btn btn-success"
                id="btnSaveTable">

                    Save Table

                </button>

            </div>

        </div>

    </div>

</div>
