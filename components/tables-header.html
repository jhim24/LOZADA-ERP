<!-- ==========================================
TABLE MANAGEMENT HEADER
========================================== -->

<div class="dashboard-header mb-4">

    <div class="dashboard-title">

        <h1>

            <i class="fa-solid fa-chair"></i>

            Table Management

        </h1>

        <p>

            Manage restaurant tables, reservations and floor layout

        </p>

    </div>

    <div class="dashboard-tools">

        <button
            class="btn btn-success"
            id="btnAddTable">

            <i class="fa-solid fa-plus"></i>

            New Table

        </button>

        <button
            class="btn btn-warning"
            id="btnEditTable">

            <i class="fa-solid fa-pen"></i>

            Edit

        </button>

        <button
            class="btn btn-danger"
            id="btnDeleteTable">

            <i class="fa-solid fa-trash"></i>

            Delete

        </button>

    </div>

</div>

<!-- ==========================================
TABLE SUMMARY
========================================== -->

<div class="row g-4 mb-4">

    <div class="col-xl-3 col-md-6">

        <div class="kpi-card">

            <div class="kpi-info">

                <small>Total Tables</small>

                <h2 id="totalTables">0</h2>

            </div>

            <div class="kpi-icon">

                <i class="fa-solid fa-chair"></i>

            </div>

        </div>

    </div>

    <div class="col-xl-3 col-md-6">

        <div class="kpi-card">

            <div class="kpi-info">

                <small>Available</small>

                <h2 id="availableTables">0</h2>

            </div>

            <div class="kpi-icon">

                <i class="fa-solid fa-circle-check"></i>

            </div>

        </div>

    </div>

    <div class="col-xl-3 col-md-6">

        <div class="kpi-card">

            <div class="kpi-info">

                <small>Occupied</small>

                <h2 id="occupiedTables">0</h2>

            </div>

            <div class="kpi-icon">

                <i class="fa-solid fa-utensils"></i>

            </div>

        </div>

    </div>

    <div class="col-xl-3 col-md-6">

        <div class="kpi-card">

            <div class="kpi-info">

                <small>Reserved</small>

                <h2 id="reservedTables">0</h2>

            </div>

            <div class="kpi-icon">

                <i class="fa-solid fa-calendar-check"></i>

            </div>

        </div>

    </div>

</div>
