<!-- ==========================================
     TABLE MANAGEMENT HEADER
========================================== -->

<div class="card shadow-sm border-0 mb-4">

    <div class="card-body">

        <div class="d-flex justify-content-between align-items-center flex-wrap">

            <div>

                <h2 class="fw-bold mb-1">

                    <i class="fa-solid fa-chair text-primary"></i>

                    Table Management

                </h2>

                <small class="text-muted">

                    Manage Restaurant Tables & Floor Areas

                </small>

            </div>

           <div class="d-flex gap-2">

    <button
    class="btn btn-primary"
    id="btnAddTable">

        <i class="fa-solid fa-plus"></i>

        Add Table

    </button>

    <button
    class="btn btn-warning"
    id="btnEditTable">

        <i class="fa-solid fa-pen"></i>

        Edit

    </button>

    <button
    class="btn btn-danger"
    id="btnDeleteTable">

        <i class="fa-solid fa-trash"></i>

        Delete

    </button>

</div>
        </div>

    </div>

</div>

<div class="row g-3 mb-4">

    <div class="col-lg-3">

        <div class="card border-success">

            <div class="card-body text-center">

                <small>Available</small>

                <h2 id="availableTables">0</h2>

            </div>

        </div>

    </div>

    <div class="col-lg-3">

        <div class="card border-danger">

            <div class="card-body text-center">

                <small>Occupied</small>

                <h2 id="occupiedTables">0</h2>

            </div>

        </div>

    </div>

    <div class="col-lg-3">

        <div class="card border-warning">

            <div class="card-body text-center">

                <small>Reserved</small>

                <h2 id="reservedTables">0</h2>

            </div>

        </div>

    </div>

    <div class="col-lg-3">

        <div class="card border-secondary">

            <div class="card-body text-center">

                <small>Cleaning</small>

                <h2 id="cleaningTables">0</h2>

            </div>

        </div>

    </div>

</div>
