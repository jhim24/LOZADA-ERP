<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>LOZADA ERP Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet"
href="assets/css/dashboard.css">

</head>

<body>

<div class="wrapper">

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<i class="fa-solid fa-utensils"></i>

<h2>LOZADA ERP</h2>

</div>

<ul>

<li class="active">

<i class="fa-solid fa-house"></i>

<span>Dashboard</span>

</li>

<li>

<i class="fa-solid fa-cash-register"></i>

<span>POS</span>

</li>

<li>

<i class="fa-solid fa-receipt"></i>

<span>Orders</span>

</li>

<li>

<i class="fa-solid fa-box"></i>

<span>Inventory</span>

</li>

<li>

<i class="fa-solid fa-users"></i>

<span>Customers</span>

</li>

<li>

<i class="fa-solid fa-user-group"></i>

<span>HR</span>

</li>

<li>

<i class="fa-solid fa-money-bill-wave"></i>

<span>Payroll</span>

</li>

<li>

<i class="fa-solid fa-chart-line"></i>

<span>Accounting</span>

</li>

<li>

<i class="fa-solid fa-chart-pie"></i>

<span>Reports</span>

</li>

<li>

<i class="fa-solid fa-gear"></i>

<span>Settings</span>

</li>

</ul>

</div>

<!-- MAIN -->

<div class="main">

<!-- NAVBAR -->

<div class="navbar">

<div>

<h3>Dashboard</h3>

</div>

<div class="profile">

<i class="fa-regular fa-bell"></i>

<img src="https://ui-avatars.com/api/?name=Admin">

</div>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">

<h5>Today's Sales</h5>

<h2>₱45,680</h2>

</div>

<div class="card">

<h5>Orders</h5>

<h2>128</h2>

</div>

<div class="card">

<h5>Customers</h5>

<h2>54</h2>

</div>

<div class="card">

<h5>Products</h5>

<h2>327</h2>

</div>

</div>

</div>

</div>

</body>

</html>
