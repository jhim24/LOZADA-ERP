<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOZADA ERP</title>

    <link rel="manifest" href="manifest.json">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{

            background:linear-gradient(135deg,#0F172A,#1E3A8A);

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            overflow:hidden;

            color:white;

        }

        .loader{

            text-align:center;

        }

        .logo{

            width:120px;

            height:120px;

            margin:auto;

            border-radius:50%;

            background:#F59E0B;

            display:flex;

            justify-content:center;

            align-items:center;

            margin-bottom:30px;

            animation:pop .8s ease;

        }

        .logo i{

            font-size:55px;

            color:white;

        }

        h1{

            font-size:48px;

            font-weight:700;

            margin-bottom:10px;

        }

        p{

            opacity:.8;

            margin-bottom:40px;

        }

        .spinner{

            width:70px;

            height:70px;

            border:7px solid rgba(255,255,255,.2);

            border-top:7px solid #F59E0B;

            border-radius:50%;

            margin:auto;

            animation:spin 1s linear infinite;

        }

        @keyframes spin{

            100%{

                transform:rotate(360deg);

            }

        }

        @keyframes pop{

            from{

                transform:scale(.5);

                opacity:0;

            }

            to{

                transform:scale(1);

                opacity:1;

            }

        }

        .version{

            margin-top:30px;

            font-size:14px;

            opacity:.6;

        }

    </style>

</head>

<body>

<div class="loader">

    <div class="logo">

        <i class="fa-solid fa-utensils"></i>

    </div>

    <h1>LOZADA ERP</h1>

    <p>Restaurant & Business Management System</p>

    <div class="spinner"></div>

    <div class="version">

        Version 1.0.0

    </div>

</div>

<script>

setTimeout(function(){

window.location.href="dashboard.html";

},2000);

if('serviceWorker' in navigator){

navigator.serviceWorker.register('sw.js');

}

</script>

</body>
</html>
