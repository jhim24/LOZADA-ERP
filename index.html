<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LOZADA ERP</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#5B3DF5,#8B5CF6);

overflow:hidden;

}

.container{

text-align:center;

color:white;

animation:fadeIn 1s;

}

.logo{

width:130px;

height:130px;

background:white;

border-radius:30px;

display:flex;

justify-content:center;

align-items:center;

margin:auto;

box-shadow:0 20px 50px rgba(0,0,0,.25);

}

.logo i{

font-size:60px;

color:#5B3DF5;

}

h1{

margin-top:30px;

font-size:40px;

font-weight:700;

}

p{

margin-top:10px;

opacity:.85;

font-size:18px;

}

.loader{

margin:40px auto;

width:55px;

height:55px;

border:5px solid rgba(255,255,255,.2);

border-top:5px solid white;

border-radius:50%;

animation:spin 1s linear infinite;

}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

@keyframes fadeIn{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

<i class="fa-solid fa-utensils"></i>

</div>

<h1>LOZADA ERP</h1>

<p>Restaurant Management System</p>

<div class="loader"></div>

</div>

<script>

setTimeout(function(){

window.location.href="pages/dashboard.html";

},2000);

</script>

</body>

</html>
