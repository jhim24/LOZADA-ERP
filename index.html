<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOZADA ERP</title>

    <link rel="manifest" href="manifest.json">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#081120,#1E3A8A);
            overflow:hidden;
        }

        .loader{
            text-align:center;
            color:#fff;
        }

        .logo{
            width:130px;
            height:130px;
            border-radius:50%;
            background:#F59E0B;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:auto;
            margin-bottom:25px;
            box-shadow:0 10px 30px rgba(0,0,0,.35);
        }

        .logo i{
            font-size:60px;
            color:#fff;
        }

        h1{
            font-size:50px;
            font-weight:700;
            margin-bottom:10px;
        }

        h5{
            font-weight:400;
            opacity:.9;
            margin-bottom:40px;
        }

        .spinner{
            width:70px;
            height:70px;
            border:8px solid rgba(255,255,255,.15);
            border-top:8px solid #F59E0B;
            border-radius:50%;
            margin:auto;
            animation:spin 1s linear infinite;
        }

        @keyframes spin{

            100%{

                transform:rotate(360deg);

            }

        }

        .version{

            margin-top:35px;

            opacity:.6;

        }

    </style>

</head>

<body>

<div class="loader">

    <div class="logo">

        <i class="fa-solid fa-utensils"></i>

    </div>

    <h1>LOZADA ERP</h1>

    <h5>Restaurant & Business Management System</h5>

    <div class="spinner"></div>

    <div class="version">

        Version 1.0.0

    </div>

</div>

<script>

setTimeout(function(){

window.location.href="pages/dashboard.html";

},2000);

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js");

}

</script>

</body>

</html>
