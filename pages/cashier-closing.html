<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>LOZADA ERP | Cashier Closing</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet"
href="../assets/css/dashboard.css">

<link rel="stylesheet"
href="../assets/css/cashier-closing.css">

</head>

<body>

<div class="wrapper">

    <!-- SIDEBAR -->

    <div id="sidebar"></div>

    <main class="main">

        <!-- NAVBAR -->

        <div id="navbar"></div>

        <div class="container-fluid mt-4">

            <!-- HEADER -->

            <div id="closing-header"></div>

            <!-- CASHIER INFO -->

            <div id="closing-info"></div>

            <!-- SALES SUMMARY -->

            <div id="closing-summary"></div>

            <!-- PAYMENT SUMMARY -->

            <div id="closing-payment"></div>

            <!-- CASH COUNT -->

            <div id="closing-cash"></div>

            <!-- DENOMINATION -->

            <div id="closing-denomination"></div>

            <!-- EXPENSES -->

            <div id="closing-expenses"></div>

            <!-- NOTES -->

            <div id="closing-notes"></div>

            <!-- SIGNATURE -->

            <div id="closing-signature"></div>

        </div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../assets/js/cashier-closing.js"></script>

</html>
