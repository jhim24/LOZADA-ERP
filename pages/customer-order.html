<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Customer Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    background:#f4f6f9;
    font-family:Segoe UI,sans-serif;
}

.card{
    max-width:900px;
    margin:40px auto;
    border:none;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.card-header{
    background:#C8102E;
    color:#fff;
    font-size:24px;
    font-weight:bold;
}

.form-label{
    font-weight:600;
}

#deliverySection{
    display:none;
}

</style>

</head>

<body>

<div class="card">

<div class="card-header">

<i class="fa-solid fa-user"></i>

Customer Information

</div>

<div class="card-body">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">

Customer Name

</label>

<input
type="text"
id="customerName"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Mobile Number

</label>

<input
type="text"
id="customerPhone"
class="form-control">

</div>

    <div class="col-md-6 mb-3">

<label class="form-label">

Order Type

</label>

<input
type="text"
id="orderTypeDisplay"
class="form-control"
readonly>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Order Source

</label>

<select
id="orderSource"
class="form-select">

<option value="Walk-in">Walk-in</option>
<option value="Phone">Phone Call</option>
<option value="Facebook">Facebook</option>
<option value="Messenger">Messenger</option>
<option value="Website">Website</option>
<option value="Grab">Grab</option>
<option value="FoodPanda">FoodPanda</option>

</select>

</div>
    <div class="col-md-6 mb-3">

<label class="form-label">

Email Address

</label>

<input
type="email"
id="customerEmail"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">

Requested Time

</label>

<input
type="datetime-local"
id="requestedTime"
class="form-control">

</div>
<div class="col-md-12 mb-3">

<label class="form-label">

Order Notes

</label>

<textarea
id="customerNotes"
class="form-control"
rows="3"></textarea>

</div>

</div>

<div id="deliverySection">

<hr>

<h5>

Delivery Information

</h5>

<div class="mb-3">

<label class="form-label">

Delivery Address

</label>

<textarea
id="deliveryAddress"
class="form-control"
rows="3"></textarea>

</div>

<div class="row">

<div class="col-md-6">

<label class="form-label">

Delivery Partner

</label>

<select
id="deliveryPartner"
class="form-select">

<option>In-house Rider</option>

<option>Grab</option>

<option>FoodPanda</option>

<option>Lalamove</option>

<option>Maxim</option>

</select>

</div>

<div class="col-md-6">

<label class="form-label">

Delivery Fee

</label>

<input
type="number"
id="deliveryFee"
class="form-control"
value="0">

</div>

</div>

</div>

<hr>

<div class="text-end">

<button
class="btn btn-primary btn-lg"
onclick="proceedPOS()">

<i class="fa-solid fa-arrow-right"></i>

Proceed to POS

</button>

</div>

</div>

</div>

<script>

const orderType = localStorage.getItem("orderType") || "TAKE-OUT";

document.getElementById("orderTypeDisplay").value = orderType;

if(orderType === "DELIVERY"){

    document.getElementById("deliverySection").style.display = "block";

}

function proceedPOS(){

    const customer={

        orderType:orderType,

        orderSource:document.getElementById("orderSource").value,

        name:document.getElementById("customerName").value,

        phone:document.getElementById("customerPhone").value,

        email:document.getElementById("customerEmail").value,

        requestedTime:document.getElementById("requestedTime").value,

        notes:document.getElementById("customerNotes").value,

        address:document.getElementById("deliveryAddress").value,

        partner:document.getElementById("deliveryPartner").value,

        fee:Number(document.getElementById("deliveryFee").value || 0)

    };

    localStorage.setItem(
        "customerOrder",
        JSON.stringify(customer)
    );

    window.location.href="pos.html";

}
</script>

</body>
</html>
