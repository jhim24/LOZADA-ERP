<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LOZADA ERP | Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="../assets/css/dashboard.css">

</head>

<body>

<div class="wrapper">

    <!-- SIDEBAR -->
    <div id="sidebar"></div>

    <!-- MAIN -->
    <main class="main">

        <!-- NAVBAR -->
        <div id="navbar"></div>

       <div class="container-fluid dashboard-container">

          <!-- ==========================================
DASHBOARD HEADER
========================================== -->

<div class="dashboard-header">

    <div class="dashboard-title">

        <h1>

            <i class="fa-solid fa-chart-pie"></i>

            Dashboard

        </h1>

        <p>

            Welcome back,

            <strong>Administrator</strong>

        </p>

    </div>

    <div class="dashboard-tools">

        <div class="dashboard-clock">

            <i class="fa-regular fa-clock"></i>

            <span id="liveClock">

                --:--:--

            </span>

        </div>

        <button class="btn btn-outline-primary">

            <i class="fa-solid fa-download"></i>

            Export

        </button>

        <button class="btn btn-success">

            <i class="fa-solid fa-chart-line"></i>

            Reports

        </button>

    </div>

</div>

    <!-- KPI CARDS -->

    <div id="dashboard-cards" class="mt-4"></div>

    <!-- CHARTS -->

    <div id="dashboard-charts" class="mt-4"></div>

    <!-- ORDERS -->

    <div id="dashboard-orders" class="mt-4"></div>

    <!-- KITCHEN -->

    <div id="dashboard-kitchen" class="mt-4"></div>

    <!-- INVENTORY -->

    <div id="dashboard-inventory" class="mt-4"></div>

    <!-- SUMMARY -->

    <div id="dashboard-summary" class="mt-4"></div>

    </div>
        
    </main>

    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="../assets/js/layout.js"></script>

<script src="../assets/js/dashboard.js"></script>
</body>

</html>
