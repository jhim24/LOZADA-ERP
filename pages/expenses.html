<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Expenses Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="../assets/css/dashboard.css">

<link rel="stylesheet" href="../assets/css/expenses.css">

</head>

<body>

        <div class="dashboard-container">

<!-- ==========================================
EXPENSE HEADER
========================================== -->

<div class="dashboard-header">

    <div class="dashboard-title">

        <h1>

            <i class="fa-solid fa-file-invoice-dollar"></i>

            Expenses Management

        </h1>

        <p>

            Record • Monitor • Control Restaurant Expenses

        </p>

    </div>

    <div class="dashboard-tools">

        <div class="dashboard-clock">

            <i class="fa-regular fa-clock"></i>

            <span id="liveClock">

                --:--:--

            </span>

        </div>

        <button class="btn btn-outline-primary">

            <i class="fa-solid fa-download"></i>

            Export

        </button>

        <button class="btn btn-success" id="btnNewExpense">

            <i class="fa-solid fa-plus"></i>

            New Expense

        </button>

    </div>

</div>

<!-- ==========================================
KPI CARDS
========================================== -->

<div class="row g-4 mb-4">

<div class="col-xl-3 col-lg-6">

<div class="kpi-card">

<div class="kpi-info">

<small>Today's Expenses</small>

<h2 id="todayExpense">₱0.00</h2>

</div>

<div class="kpi-icon">

<i class="fa-solid fa-money-bill-wave"></i>

</div>

</div>

</div>

<div class="col-xl-3 col-lg-6">

<div class="kpi-card">

<div class="kpi-info">

<small>This Week</small>

<h2 id="weekExpense">₱0.00</h2>

</div>

<div class="kpi-icon">

<i class="fa-solid fa-calendar-week"></i>

</div>

</div>

</div>

<div class="col-xl-3 col-lg-6">

<div class="kpi-card">

<div class="kpi-info">

<small>This Month</small>

<h2 id="monthExpense">₱0.00</h2>

</div>

<div class="kpi-icon">

<i class="fa-solid fa-calendar"></i>

</div>

</div>

</div>

<div class="col-xl-3 col-lg-6">

<div class="kpi-card">

<div class="kpi-info">

<small>This Year</small>

<h2 id="yearExpense">₱0.00</h2>

</div>

<div class="kpi-icon">

<i class="fa-solid fa-chart-line"></i>

</div>

</div>

</div>

</div>

<!-- ==========================================
EXPENSE INFORMATION
========================================== -->

<div class="widget mb-4">

<div class="widget-header">

<h4>

<i class="fa-solid fa-receipt"></i>

Expense Information

</h4>

</div>

<div class="widget-body">

<div class="row g-3">

<div class="col-lg-3">

<label class="form-label">

Expense No.

</label>

<input

type="text"

id="expenseNo"

class="form-control"

readonly>

</div>

<div class="col-lg-3">

<label class="form-label">

Expense Date

</label>

<input

type="date"

id="expenseDate"

class="form-control">

</div>

<div class="col-lg-3">

<label class="form-label">

Category

</label>

<select

id="expenseCategory"

class="form-select">

<option>Food Cost</option>

<option>Utilities</option>

<option>Salary</option>

<option>Rent</option>

<option>Transportation</option>

<option>Maintenance</option>

<option>Marketing</option>

<option>Office Supplies</option>

<option>Packaging</option>

<option>Equipment</option>

<option>Others</option>

</select>

</div>

<div class="col-lg-3">

<label class="form-label">

Payment Method

</label>

<select

id="paymentMethod"

class="form-select">

<option>Cash</option>

<option>Bank</option>

<option>GCash</option>

<option>Maya</option>

<option>Credit Card</option>

<option>Cheque</option>

</select>

</div>

<div class="col-lg-6">

<label class="form-label">

Supplier / Payee

</label>

<input

type="text"

id="expenseSupplier"

class="form-control"

placeholder="Supplier or Payee">

</div>

<div class="col-lg-6">

<label class="form-label">

Reference No.

</label>

<input

type="text"

id="referenceNo"

class="form-control"

placeholder="Invoice / Receipt No.">

</div>

<div class="col-lg-12">

<label class="form-label">

Description

</label>

<textarea

id="expenseDescription"

class="form-control"

rows="3"

placeholder="Expense description..."></textarea>

</div>

<div class="col-lg-3">

<label class="form-label">

Amount

</label>

<input

type="number"

id="expenseAmount"

class="form-control"

placeholder="0.00">

</div>

<div class="col-lg-3">

<label class="form-label">

VAT %

</label>

<input

type="number"

id="expenseVat"

class="form-control"

value="0">

</div>

<div class="col-lg-3">

<label class="form-label">

Status

</label>

<select

id="expenseStatus"

class="form-select">

<option>Pending</option>

<option>Approved</option>

<option>Paid</option>

<option>Cancelled</option>

</select>

</div>

<div class="col-lg-3">

<label class="form-label">

Prepared By

</label>

<input

type="text"

id="preparedBy"

class="form-control"

value="Administrator">

</div>

</div>

</div>
<!-- ==========================================
EXPENSE HISTORY
========================================== -->

<div class="widget">

    <div class="widget-header">

        <h4>

            <i class="fa-solid fa-table"></i>

            Expense History

        </h4>

    </div>

    <div class="widget-body">

        <div class="table-responsive">

            <table class="table table-hover">

                <thead>

                    <tr>

                        <th>Expense No.</th>

                        <th>Date</th>

                        <th>Category</th>

                        <th>Supplier</th>

                        <th>Amount</th>

                        <th>Status</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="expenseTableBody">

                    <tr>

                        <td colspan="7" class="text-center">

                            No Expense Found

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
</div>
        </div>
    </body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../assets/js/expenses.js"></script>

</html>
