<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LOZADA ERP | Restaurant POS</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Dashboard CSS -->
<link rel="stylesheet" href="../assets/css/dashboard.css">

<!-- POS CSS -->
<link rel="stylesheet" href="../assets/css/pos.css">
<link rel="stylesheet" href="../assets/css/receipt.css">
</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <div id="sidebar"></div>

    <main class="main">

        <!-- Navbar -->
        <div id="navbar"></div>

        <!-- POS Header -->
        <div id="pos-header"></div>
        <!-- ==========================================
     ORDER TYPE
========================================== -->

<div class="card shadow-sm mt-3">

    <div class="card-body">

        <div class="row align-items-center">

            <div class="col-md-2">

                <strong>

                    <i class="fa-solid fa-list"></i>

                    Order Type

                </strong>

            </div>

            <div class="col-md-10">

                <div class="btn-group" role="group">

                    <input
                        type="radio"
                        class="btn-check"
                        name="orderType"
                        id="orderDineIn"
                        value="DINE-IN"
                        checked>

                    <label
                        class="btn btn-outline-primary"
                        for="orderDineIn">

                        🍽 DINE-IN

                    </label>

                    <input
                        type="radio"
                        class="btn-check"
                        name="orderType"
                        id="orderTakeOut"
                        value="TAKE OUT">

                    <label
                        class="btn btn-outline-success"
                        for="orderTakeOut">

                        🛍 TAKE OUT

                    </label>

                    <input
                        type="radio"
                        class="btn-check"
                        name="orderType"
                        id="orderDelivery"
                        value="DELIVERY">

                    <label
                        class="btn btn-outline-danger"
                        for="orderDelivery">

                        🛵 DELIVERY

                    </label>

                </div>

            </div>

        </div>

    </div>

</div>
<!-- Selected Table Information -->

<!-- DINE-IN INFORMATION -->

<div
id="selectedTableInfo"
class="alert alert-primary mt-3 mb-3 d-none">

    <div class="row">

        <div class="col-md-3">

            <strong>

                <i class="fa-solid fa-chair"></i>

                Table

            </strong>

            <br>

            <span id="selectedFloor"></span>

            -

            <span id="selectedTable"></span>

        </div>

        <div class="col-md-3">

            <strong>

                Customer

            </strong>

            <br>

            <span id="selectedCustomer">

                Walk-in

            </span>

        </div>

        <div class="col-md-2">

            <strong>

                Guests

            </strong>

            <br>

            <span id="selectedGuests">

                1

            </span>

        </div>

        <div class="col-md-2">

            <strong>

                Server

            </strong>

            <br>

            <span id="selectedServer">

                -

            </span>

        </div>

        <div class="col-md-2 text-end">

            <span
            class="badge bg-success">

                DINE-IN

            </span>

        </div>

    </div>

</div>
  <!-- CUSTOMER ORDER INFORMATION -->

<div
id="customerOrderInfo"
class="alert alert-warning mt-3 mb-3 d-none">

<div class="row">

<div class="col-md-3">

<strong>Order Type</strong>

<br>

<span id="customerOrderType">-</span>

</div>

<div class="col-md-3">

<strong>Customer</strong>

<br>

<span id="customerOrderName">-</span>

</div>

<div class="col-md-3">

<strong>Phone</strong>

<br>

<span id="customerOrderPhone">-</span>

</div>

<div class="col-md-3">

<strong>Source</strong>

<br>

<span id="customerOrderSource">-</span>

</div>

</div>

<hr>

<div class="row">

<div class="col-md-6">

<strong>Delivery Address</strong>

<br>

<span id="customerOrderAddress">-</span>

</div>

<div class="col-md-3">

<strong>Delivery Partner</strong>

<br>

<span id="customerOrderPartner">-</span>

</div>

<div class="col-md-3">

<strong>Delivery Fee</strong>

<br>

₱<span id="customerOrderFee">0.00</span>

</div>

</div>

</div>
        <!-- Categories -->
        <div id="pos-categories"></div>

        <!-- Products -->
        <div id="pos-products"></div>

        <div class="row mt-4">

            <!-- Shopping Cart -->
            <div class="col-lg-8">

                <div id="pos-cart"></div>

            </div>

            <!-- Payment -->
            <div class="col-lg-4">

                <div id="pos-payment"></div>

            </div>

        </div>

    </main>

</div>

<!-- Receipt Modal -->
<div id="receipt-modal"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- JS -->
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/pos.js"></script>
</body>

</html>
