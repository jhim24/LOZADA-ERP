<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Purchase Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="../assets/css/purchase.css">

</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar"></div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- NAVBAR -->
    <div id="navbar"></div>

    <div class="container-fluid p-4">

        <!-- ==========================================
        PAGE HEADER
        ========================================== -->

        <div class="d-flex justify-content-between align-items-center mb-4">

            <div>

                <h2 class="mb-0">

                    <i class="fa-solid fa-cart-shopping"></i>

                    Purchase Management

                </h2>

                <small class="text-muted">

                    Purchase Orders & Supplier Management

                </small>

            </div>

            <button
                class="btn btn-primary"
                id="btnNewPurchase">

                <i class="fa-solid fa-plus"></i>

                New Purchase

            </button>

        </div>

        <!-- ==========================================
        PURCHASE DASHBOARD
        ========================================== -->

        <div class="row mb-4">

            <div class="col-lg-3 col-md-6 mb-3">

                <div class="card border-primary shadow-sm">

                    <div class="card-body">

                        <div class="d-flex justify-content-between align-items-center">

                            <div>

                                <small class="text-muted">

                                    Total Purchases

                                </small>

                                <h3 id="totalPurchaseAmount">

                                    ₱0.00

                                </h3>

                            </div>

                            <i class="fa-solid fa-sack-dollar fa-2x text-primary"></i>

                        </div>

                    </div>

                </div>

            </div>

            <div class="col-lg-3 col-md-6 mb-3">

                <div class="card border-warning shadow-sm">

                    <div class="card-body">

                        <div class="d-flex justify-content-between align-items-center">

                            <div>

                                <small class="text-muted">

                                    Pending P.O.

                                </small>

                                <h3 id="pendingPurchase">

                                    0

                                </h3>

                            </div>

                            <i class="fa-solid fa-clock fa-2x text-warning"></i>

                        </div>

                    </div>

                </div>

            </div>

            <div class="col-lg-3 col-md-6 mb-3">

                <div class="card border-success shadow-sm">

                    <div class="card-body">

                        <div class="d-flex justify-content-between align-items-center">

                            <div>

                                <small class="text-muted">

                                    Received P.O.

                                </small>

                                <h3 id="receivedPurchase">

                                    0

                                </h3>

                            </div>

                            <i class="fa-solid fa-box-open fa-2x text-success"></i>

                        </div>

                    </div>

                </div>

            </div>

            <div class="col-lg-3 col-md-6 mb-3">

                <div class="card border-danger shadow-sm">

                    <div class="card-body">

                        <div class="d-flex justify-content-between align-items-center">

                            <div>

                                <small class="text-muted">

                                    Suppliers

                                </small>

                                <h3 id="supplierCount">

                                    0

                                </h3>

                            </div>

                            <i class="fa-solid fa-truck fa-2x text-danger"></i>

                        </div>

                    </div>

                </div>

            </div>

        </div>

       <!-- ==========================================
PURCHASE FORM
========================================== -->

<div id="purchaseForm">

<div class="card shadow-sm mb-4">

    <div class="card-header bg-primary text-white">

        <i class="fa-solid fa-file-invoice"></i>

        Purchase Information

    </div>

    <div class="card-body">

        <div class="row">

            <div class="col-md-3 mb-3">

                <label class="form-label">

                    Purchase No.

                </label>

                <input
                    type="text"
                    id="purchaseNo"
                    class="form-control"
                    readonly>

            </div>

            <div class="col-md-3 mb-3">

                <label class="form-label">

                    Purchase Date

                </label>

                <input
                    type="date"
                    id="purchaseDate"
                    class="form-control">

            </div>

            <div class="col-md-3 mb-3">

                <label class="form-label">

                    Delivery Date

                </label>

                <input
                    type="date"
                    id="deliveryDate"
                    class="form-control">

            </div>

            <div class="col-md-3 mb-3">

                <label class="form-label">

                    Status

                </label>

                <select
                    id="purchaseStatus"
                    class="form-select">

                    <option>Draft</option>

                    <option>Pending</option>

                    <option>Approved</option>

                    <option>Received</option>

                    <option>Cancelled</option>

                </select>

            </div>

        </div>

        <div class="row">

            <div class="col-md-6 mb-3">

                <label class="form-label">

                    Supplier

                </label>

                <select
                    id="supplierName"
                    class="form-select">

                    <option value="">

                        Select Supplier

                    </option>

                </select>

            </div>

            <div class="col-md-3 mb-3">

                <label class="form-label">

                    Reference No.

                </label>

                <input
                    type="text"
                    id="referenceNo"
                    class="form-control"
                    placeholder="Invoice / DR No.">

            </div>

            <div class="col-md-3 mb-3">

                <label class="form-label">

                    Prepared By

                </label>

                <input
                    type="text"
                    id="preparedBy"
                    class="form-control"
                    value="Administrator">

            </div>

        </div>

        <div class="row">

            <div class="col-12">

                <label class="form-label">

                    Remarks

                </label>

                <textarea
                    id="purchaseRemarks"
                    class="form-control"
                    rows="3"
                    placeholder="Enter remarks..."></textarea>

            </div>

        </div>

    </div>

</div>

</div>
        <!-- ==========================================
        PURCHASE TABLE
        ========================================== -->

        <div id="purchaseTable"></div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../assets/js/purchase.js"></script>

</body>

</html>
