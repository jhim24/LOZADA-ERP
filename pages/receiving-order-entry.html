<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Receiving Order Entry</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    background:#f4f6f9;
    font-family:Segoe UI,sans-serif;
}

.header{
    background:#C8102E;
    color:#fff;
    padding:20px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

.container-box{
    max-width:1100px;
    margin:40px auto;
}

.order-card{
    border:none;
    border-radius:20px;
    transition:.3s;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.order-card:hover{
    transform:translateY(-8px);
    box-shadow:0 20px 35px rgba(0,0,0,.18);
}

.order-card .card-body{
    padding:40px;
    text-align:center;
}

.order-card i{
    font-size:70px;
    margin-bottom:20px;
}

.order-card h3{
    font-weight:bold;
}

.order-card p{
    color:#777;
    min-height:45px;
}

</style>

</head>

<body>

<div class="header">

<i class="fa-solid fa-bell-concierge"></i>

Receiving Order Entry

</div>

<div class="container container-box">

<div class="mb-4">

    <div class="card shadow">

      <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">

    <div>

        <i class="fa-solid fa-globe"></i>

        ONLINE ORDERS

    </div>

    <span
    class="badge bg-danger"
    id="onlineOrderCount">

        0

    </span>

</div>

        <div class="card-body">

            <div id="onlineOrdersList">

                <div class="text-center p-4">

                    Loading Online Orders...

                </div>

            </div>

        </div>

    </div>

</div>

<div class="row g-4">

<div class="col-md-4">

<div class="card order-card">

<div class="card-body">

<i class="fa-solid fa-utensils text-warning"></i>

<h3>DINE-IN</h3>

<p>Customer will dine inside the restaurant.</p>

<button class="btn btn-warning w-100"
onclick="selectOrder('DINE-IN')">

Proceed

</button>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card order-card">

<div class="card-body">

<i class="fa-solid fa-bag-shopping text-success"></i>

<h3>TAKE-OUT</h3>

<p>Customer will pick up the order.</p>

<button class="btn btn-success w-100"
onclick="selectOrder('TAKE-OUT')">

Proceed

</button>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card order-card">

<div class="card-body">

<i class="fa-solid fa-motorcycle text-primary"></i>

<h3>DELIVERY</h3>

<p>Order will be delivered to customer.</p>

<button class="btn btn-primary w-100"
onclick="selectOrder('DELIVERY')">

Proceed

</button>

</div>

</div>

</div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// ======================================
// FIREBASE
// ======================================

const firebaseConfig = {

    apiKey: "AIzaSyAV9T5w_1azmPHIJcZpraXP06TItj7HEuA",

    authDomain: "papprito-orders.firebaseapp.com",

    databaseURL: "https://papprito-orders-default-rtdb.firebaseio.com",

    projectId: "papprito-orders",

    storageBucket: "papprito-orders.firebasestorage.app",

    messagingSenderId: "831941801424",

    appId: "1:831941801424:web:40a99cdfb312dac2d275d5"

};

if(!firebase.apps.length){

    firebase.initializeApp(firebaseConfig);

}

const db = firebase.database();

// ======================================
// LOAD ONLINE ORDERS
// ======================================

function loadOnlineOrders(){

    const container = document.getElementById("onlineOrdersList");

    const badge = document.getElementById("onlineOrderCount");

    db.ref("onlineOrders").on("value",snapshot=>{

        let html = "";

        let total = 0;

        snapshot.forEach(child=>{

            const order = child.val();

            if(order.status !== "NEW") return;

            total++;

            html += `

            <div class="card mb-3 border-primary">

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-3">

                            <strong>${order.customerName || "-"}</strong><br>

                            ${order.customerPhone || ""}

                        </div>

                        <div class="col-md-2">

                            ${order.orderType || "-"}

                        </div>

                        <div class="col-md-2">

                            ${order.orderSource || "-"}

                        </div>

                        <div class="col-md-2">

                            ₱${Number(order.grandTotal || order.total || 0).toFixed(2)}

                        </div>

                      <div class="col-md-3 text-end">

    <span class="badge bg-warning mb-2 d-block">

        NEW

    </span>

    <button

        class="btn btn-success btn-sm"

        onclick="acceptOnlineOrder('${child.key}')">

        <i class="fa-solid fa-check"></i>

        Accept

    </button>

</div>

                    </div>

                </div>

            </div>

            `;

        });

        if(total===0){

            html = `

            <div class="alert alert-success">

                No New Online Orders

            </div>

            `;

        }

        container.innerHTML = html;

        if(badge){

            badge.innerHTML = total;

        }

    });

}

// ======================================
// MANUAL ORDER
// ======================================

function selectOrder(type){

    localStorage.setItem("orderType",type);

    if(type==="DINE-IN"){

        window.location.href="tables.html";

    }else{

        window.location.href="customer-order.html";

    }

}

// ======================================
// INITIALIZE
// ======================================

document.addEventListener("DOMContentLoaded",function(){

    loadOnlineOrders();

});
// ======================================
// ACCEPT ONLINE ORDER
// ======================================

function acceptOnlineOrder(orderId){

    alert("Accept Clicked : " + orderId);

}
</script>
</body>
</html>
