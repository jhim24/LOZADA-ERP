<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Receiving Order Entry</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    background:#f4f6f9;
    font-family:Segoe UI,sans-serif;
}

.header{
    background:#C8102E;
    color:#fff;
    padding:20px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
}

.container-box{
    max-width:1100px;
    margin:40px auto;
}

.order-card{
    border:none;
    border-radius:20px;
    transition:.3s;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.order-card:hover{
    transform:translateY(-8px);
    box-shadow:0 20px 35px rgba(0,0,0,.18);
}

.order-card .card-body{
    padding:40px;
    text-align:center;
}

.order-card i{
    font-size:70px;
    margin-bottom:20px;
}

.order-card h3{
    font-weight:bold;
}

.order-card p{
    color:#777;
    min-height:45px;
}

</style>

</head>

<body>

<div class="header">

<i class="fa-solid fa-bell-concierge"></i>

Receiving Order Entry

</div>

<div class="container container-box">

<div class="row g-4">

<div class="col-md-4">

<div class="card order-card">

<div class="card-body">

<i class="fa-solid fa-utensils text-warning"></i>

<h3>DINE-IN</h3>

<p>Customer will dine inside the restaurant.</p>

<button class="btn btn-warning w-100"
onclick="selectOrder('DINE-IN')">

Proceed

</button>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card order-card">

<div class="card-body">

<i class="fa-solid fa-bag-shopping text-success"></i>

<h3>TAKE-OUT</h3>

<p>Customer will pick up the order.</p>

<button class="btn btn-success w-100"
onclick="selectOrder('TAKE-OUT')">

Proceed

</button>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card order-card">

<div class="card-body">

<i class="fa-solid fa-motorcycle text-primary"></i>

<h3>DELIVERY</h3>

<p>Order will be delivered to customer.</p>

<button class="btn btn-primary w-100"
onclick="selectOrder('DELIVERY')">

Proceed

</button>

</div>

</div>

</div>

</div>

</div>

<script>

function selectOrder(type){

    localStorage.setItem("orderType",type);

    if(type==="DINE-IN"){

        window.location.href="tables.html";

    }else{

        window.location.href="customer-order.html";

    }

}

</script>

</body>
</html>
