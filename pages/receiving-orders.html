<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receiving Orders</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f5f7fb;
padding:25px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h1{
font-size:32px;
color:#e91e63;
}

.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:25px;

}

.card{

background:white;

padding:20px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

}

.card h3{

font-size:15px;

margin-bottom:10px;

color:#666;

}

.card h2{

font-size:32px;

color:#2f3b4f;

}

.table-box{

background:white;

border-radius:15px;

padding:20px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

overflow:auto;

}

table{

width:100%;

border-collapse:collapse;

margin-top:15px;

}

th{

background:#2f3b4f;

color:white;

padding:12px;

}

td{

padding:12px;

border-bottom:1px solid #eee;

text-align:center;

}

.status{

padding:6px 12px;

border-radius:20px;

background:#ff9800;

color:white;

font-size:12px;

}

</style>

</head>

<body>

<div class="header">

<h1>

📥 Receiving Orders

</h1>

</div>

<div class="cards">

<div class="card">

<h3>Today's Orders</h3>

<h2 id="todayOrders">

0

</h2>

</div>

<div class="card">

<h3>Waiting</h3>

<h2 id="waitingOrders">

0

</h2>

</div>

<div class="card">

<h3>Accepted</h3>

<h2 id="acceptedOrders">

0

</h2>

</div>

<div class="card">

<h3>Total Sales</h3>

<h2 id="totalSales">

₱0

</h2>

</div>

</div>

<div class="table-box">

<h2>

Incoming Orders

</h2>

<table>

<thead>

<tr>

<th>Order #</th>

<th>Customer</th>

<th>Source</th>

<th>Total</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</body>
</html>
