<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receiving Orders</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#f5f7fb;
padding:25px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h1{
font-size:32px;
color:#e91e63;
}

.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:25px;

}

.card{

background:white;

padding:20px;

border-radius:15px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

}

.card h3{

font-size:15px;

margin-bottom:10px;

color:#666;

}

.card h2{

font-size:32px;

color:#2f3b4f;

}

.table-box{

background:white;

border-radius:15px;

padding:20px;

box-shadow:0 5px 15px rgba(0,0,0,.08);

overflow:auto;

}

table{

width:100%;

border-collapse:collapse;

margin-top:15px;

}

th{

background:#2f3b4f;

color:white;

padding:12px;

}

td{

padding:12px;

border-bottom:1px solid #eee;

text-align:center;

}

.status{

padding:6px 12px;

border-radius:20px;

background:#ff9800;

color:white;

font-size:12px;

}

</style>

</head>

<body>

<div class="header">

<h1>

📥 Receiving Orders

</h1>

</div>

<div class="cards">

<div class="card">

<h3>Today's Orders</h3>

<h2 id="todayOrders">

0

</h2>

</div>

<div class="card">

<h3>Waiting</h3>

<h2 id="waitingOrders">

0

</h2>

</div>

<div class="card">

<h3>Accepted</h3>

<h2 id="acceptedOrders">

0

</h2>

</div>

<div class="card">

<h3>Total Sales</h3>

<h2 id="totalSales">

₱0

</h2>

</div>

</div>

<div class="table-box">

<h2>

Incoming Orders

</h2>

<table>

<thead>

<tr>

<th>Order #</th>

<th>Customer</th>

<th>Source</th>

<th>Total</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>
<script>

const firebaseConfig={

apiKey:"AIzaSyAV9T5w_1azmPHIJcZpraXP06TItj7HEuA",

authDomain:"papprito-orders.firebaseapp.com",

databaseURL:
"https://papprito-orders-default-rtdb.firebaseio.com",

projectId:"papprito-orders",

storageBucket:"papprito-orders.firebasestorage.app",

messagingSenderId:"831941801424",

appId:"1:831941801424:web:40a99cdfb312dac2d275d5"

};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

db.ref("orders").on("value",snapshot=>{

let html="";

let todayOrders=0;

let waitingOrders=0;

let acceptedOrders=0;

let totalSales=0;

snapshot.forEach(child=>{

const order=child.val();

todayOrders++;

totalSales+=Number(order.total||0);

if(order.status==="NEW"){

waitingOrders++;

}

if(order.status==="ACCEPTED"){

acceptedOrders++;

}

html+=`

<tr>

<td>

${order.orderNumber||child.key}

</td>

<td>

${order.customer||order.customerName||"-"}

</td>

<td>

${order.source||"POS"}

</td>

<td>

₱${Number(order.total||0).toLocaleString()}

</td>

<td>

<span class="status">

${order.status||"NEW"}

</span>

</td>

<td>

<button
onclick="acceptOrder('${child.key}')"
style="
background:#28a745;
color:white;
border:none;
padding:8px 15px;
border-radius:8px;
cursor:pointer;
">

Accept

</button>

</td>

</tr>

`;

});

document.getElementById("ordersTable").innerHTML=html;

document.getElementById("todayOrders").innerText=todayOrders;

document.getElementById("waitingOrders").innerText=waitingOrders;

document.getElementById("acceptedOrders").innerText=acceptedOrders;

document.getElementById("totalSales").innerText="₱"+totalSales.toLocaleString();

});
function acceptOrder(key){

db.ref("orders/"+key).update({

status:"ACCEPTED"

}).then(()=>{

alert("Order Accepted");

});

}
</script>
</body>
</html>
